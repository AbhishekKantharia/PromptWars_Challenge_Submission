<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake: Outrun the System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="An amazing cyberpunk, neon-themed Snake game with unexpected hurdles.">
</head>
<body>
    <div class="game-wrapper">
        <header>
            <h1>NEON SNAKE</h1>
            <div class="hud">
                <div class="score-container">SCORE: <span id="score">0</span></div>
                <div class="score-container">HIGH: <span id="highScore">0</span></div>
            </div>
            <div id="effect-display" class="effect-display hidden">NORMAL</div>
        </header>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <div id="overlay" class="overlay">
                <h2 id="overlay-title">SYSTEM READY</h2>
                <p id="overlay-desc">Use Arrow Keys or WASD to move.</p>
                <button id="start-btn">INITIALIZE RUN</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
