<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Tic-Tac-Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Game Section -->
        <main class="game-section">
            <header class="game-header">
                <h1 class="glow-text">QUANTUM TIC-TAC-TOE</h1>
                <p class="subtitle">Expect the Unexpected.</p>
                <div class="status-panel">
                    <div id="status">Player X's Turn</div>
                </div>
            </header>
            
            <div class="board-container">
                <div id="board" class="board">
                    <div class="cell" data-index="0"></div>
                    <div class="cell" data-index="1"></div>
                    <div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div>
                    <div class="cell" data-index="4"></div>
                    <div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div>
                    <div class="cell" data-index="7"></div>
                    <div class="cell" data-index="8"></div>
                </div>
            </div>
            
            <div class="controls">
                <button id="reset-btn" class="btn primary-btn">REBOOT SYSTEM</button>
                <button id="toggle-terminal-btn" class="btn secondary-btn">CMD OVERRIDE</button>
            </div>
            
            <div id="event-log" class="event-log">
                <p>System initialized...</p>
            </div>
        </main>
        
        <!-- Terminal Section -->
        <aside id="terminal-section" class="terminal-section hidden">
            <div class="terminal-header">
                <h2>CMD // Command Prompt Emulator</h2>
                <button id="close-terminal-btn" class="close-btn">&times;</button>
            </div>
            <div class="terminal-body" id="terminal-output">
                <div class="log-line system-msg">Microsoft Windows [Version 10.0]</div>
                <div class="log-line system-msg">(c) Microsoft Corporation. All rights reserved.</div>
                <div class="log-line system-msg">Connected to backend via CMD.EXE engine.</div>
            </div>
            <div class="terminal-input-container">
                <span class="prompt">C:\&gt;</span>
                <input type="text" id="terminal-input" autocomplete="off" spellcheck="false" autofocus>
            </div>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
